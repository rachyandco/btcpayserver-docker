services:
  taler-merchant:
    restart: unless-stopped
    image: rachyand/taler-merchant:latest
    environment:
      TALER_MERCHANT_PORT: 9966
      TALER_MERCHANT_BASE_URL: "https://${BTCPAY_HOST}/taler-merchant/"
      TALER_MERCHANT_DB_HOST: postgres
      TALER_MERCHANT_DB_PORT: 5432
      TALER_MERCHANT_DB_USER: postgres
      TALER_MERCHANT_DB_PASSWORD: ""
      TALER_MERCHANT_DB_NAME: talermerchant${NBITCOIN_NETWORK:-regtest}
    labels:
      traefik.enable: "true"
      traefik.http.routers.taler-merchant.rule: Host(`${BTCPAY_HOST}`) && PathPrefix(`/taler-merchant/`)
      traefik.http.routers.taler-merchant.middlewares: taler-merchant-stripprefix
      traefik.http.middlewares.taler-merchant-stripprefix.stripprefix.prefixes: /taler-merchant
    expose:
      - "9966"
    links:
      - postgres
