services:
  taler-merchant-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: taler
      POSTGRES_PASSWORD: taler
      POSTGRES_DB: taler-merchant
    volumes:
      - taler_merchant_db:/var/lib/postgresql/data

  taler-merchant:
    restart: unless-stopped
    image: rachyand/taler-merchant:latest
    environment:
      TALER_MERCHANT_PORT: 9966
      TALER_MERCHANT_BASE_URL: "https://${BTCPAY_HOST}/taler-merchant/"
      TALER_MERCHANT_DB_HOST: taler-merchant-db
      TALER_MERCHANT_DB_PORT: 5432
      TALER_MERCHANT_DB_USER: taler
      TALER_MERCHANT_DB_PASSWORD: taler
      TALER_MERCHANT_DB_NAME: taler-merchant
    labels:
      traefik.enable: "true"
      traefik.http.routers.taler-merchant.rule: Host(`${BTCPAY_HOST}`) && PathPrefix(`/taler-merchant/`)
      traefik.http.routers.taler-merchant.middlewares: taler-merchant-stripprefix
      traefik.http.middlewares.taler-merchant-stripprefix.stripprefix.prefixes: /taler-merchant
    expose:
      - "9966"
    depends_on:
      - taler-merchant-db

volumes:
  taler_merchant_db:
